<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Categorías - ProyectoTienda</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; --warning: #f59e0b; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg); color: var(--text); }
        .sidenav { height: 100%; width: 250px; position: fixed; background: var(--card); padding-top: 60px; box-shadow: 4px 0 10px rgba(0,0,0,0.3); }
        .sidenav a { padding: 12px 32px; text-decoration: none; color: #94a3b8; display: block; }
        .sidenav a:hover, .sidenav a.active { color: white; background: #334155; border-left: 4px solid var(--accent); }
        #main { margin-left: 250px; padding: 20px; }
        .excel-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card); }
        .excel-table th, .excel-table td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        .btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-add { background: var(--accent); color: var(--bg); }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; color: #1e293b; margin: 10% auto; padding: 30px; width: 350px; border-radius: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidenav">
    <a th:href="@{/home}">Inicio</a>
    <a th:href="@{/usuarios}">Usuarios</a>
    <a th:href="@{/categorias}" class="active">Categorías</a>
    <a th:href="@{/productos}">Productos</a>
    <a th:href="@{/pedidos}">Pedidos</a>
</div>

<div id="main">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Gestión de Categorías</h1>
        <button class="btn btn-add" onclick="nuevaCategoria()">Nueva Categoría</button>
    </div>

    <table class="excel-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${listaCategorias}">
            <td th:text="${c.idCategoria}"></td>
            <td th:text="${c.nombreCategoria}"></td>
            <td th:text="${c.descripcionCategoria}"></td>
            <td>
                <button class="btn" style="background: var(--warning); color: white;"
                        th:onclick="editarCategoria([[${c.idCategoria}]], [[${c.nombreCategoria}]], [[${c.descripcionCategoria}]])">Editar</button>
                <a th:href="@{/categorias/eliminar/{id}(id=${c.idCategoria})}" class="btn"
                   style="background: var(--danger); color: white;" onclick="return confirm('¿Eliminar?')">Borrar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Nueva Categoría</h3>
        <form th:action="@{/categorias/guardar}" method="post">
            <input type="hidden" id="idCategoria" name="idCategoria">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="nombreCategoria" name="nombreCategoria" required>
            </div>
            <div class="form-group">
                <label>Descripción:</label>
                <input type="text" id="descripcionCategoria" name="descripcionCategoria">
            </div>
            <button type="submit" class="btn btn-add" style="width: 100%;">Guardar</button>
            <button type="button" onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px;">Cancelar</button>
        </form>
    </div>
</div>

<script>
    function nuevaCategoria() {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modalTitle').innerText = "Nueva Categoría";
        document.getElementById('idCategoria').value = "";
        document.getElementById('nombreCategoria').value = "";
        document.getElementById('descripcionCategoria').value = "";
    }
    function editarCategoria(id, nombre, desc) {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modalTitle').innerText = "Editar Categoría";
        document.getElementById('idCategoria').value = id;
        document.getElementById('nombreCategoria').value = nombre;
        document.getElementById('descripcionCategoria').value = desc;
    }
</script>
</body>
</html>
