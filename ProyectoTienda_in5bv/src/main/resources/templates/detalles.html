<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalles de Pedidos - Admin</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; --warning: #f59e0b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); }
        .sidenav { height: 100%; width: 250px; position: fixed; background: var(--card); padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .sidenav a { padding: 12px 32px; text-decoration: none; color: #94a3b8; display: block; transition: 0.3s; }
        .sidenav a:hover, .sidenav a.active { color: white; background: #334155; border-left: 4px solid var(--accent); }
        #main { margin-left: 250px; padding: 30px; }
        .table-container { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--accent); text-align: left; padding: 12px; border-bottom: 2px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-add { background: var(--accent); color: var(--bg); margin-bottom: 15px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; color: #1e293b; margin: 5% auto; padding: 30px; width: 350px; border-radius: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidenav">
    <a th:href="@{/home}">Inicio</a>
    <a th:href="@{/usuarios}">Usuarios</a>
    <a th:href="@{/categorias}">Categorías</a>
    <a th:href="@{/productos}">Productos</a>
    <a th:href="@{/pedidos}">Pedidos</a>
    <a th:href="@{/detalles}" class="active">Detalles de Pedidos</a>
</div>

<div id="main">
    <div class="table-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Gestión de Detalles</h2>
            <button class="btn btn-add" onclick="nuevoDetalle()">+ Agregar Producto a Pedido</button>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Pedido #</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>P. Unitario</th>
                <th>Subtotal</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="d : ${listaDetalles}">
                <td th:text="${d.idDetalle}"></td>
                <td th:text="${d.pedido.idPedido}"></td>
                <td th:text="${d.producto.nombreProducto}"></td>
                <td th:text="${d.cantidad}"></td>
                <td th:text="'Q' + ${d.precioUnitario}"></td>
                <td th:text="'Q' + ${d.cantidad * d.precioUnitario}"></td>
                <td>
                    <button class="btn" style="background: var(--warning); color: white;"
                            th:onclick="editarDetalle([[${d.idDetalle}]], [[${d.pedido.idPedido}]], [[${d.producto.idProducto}]], [[${d.cantidad}]], [[${d.precioUnitario}]])">
                        Editar
                    </button>
                    <a th:href="@{/detalles/eliminar/{id}(id=${d.idDetalle})}"
                       class="btn" style="background: var(--danger); color: white;"
                       onclick="return confirm('¿Seguro que desea eliminar este detalle?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalDetalle" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Detalle del Pedido</h3>
        <form th:action="@{/detalles/guardar}" method="post">
            <input type="hidden" id="idDetalle" name="idDetalle">

            <div class="form-group">
                <label>Seleccionar Pedido:</label>
                <select id="idPed" name="pedido.idPedido" required>
                    <option th:each="p : ${listaPedidos}" th:value="${p.idPedido}" th:text="'Pedido #' + ${p.idPedido}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Producto:</label>
                <select id="idProd" name="producto.idProducto" required>
                    <option th:each="pr : ${listaProductos}" th:value="${pr.idProducto}" th:text="${pr.nombreProducto}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Cantidad:</label>
                <input type="number" id="cant" name="cantidad" required>
            </div>

            <div class="form-group">
                <label>Precio Unitario:</label>
                <input type="number" step="0.01" id="prec" name="precioUnitario" required>
            </div>

            <button type="submit" class="btn btn-add" style="width: 100%;">Guardar Registro</button>
            <button type="button" onclick="cerrarModal()" style="width: 100%; margin-top: 10px; cursor: pointer;">Cancelar</button>
        </form>
    </div>
</div>

<script>
    function nuevoDetalle() {
        document.getElementById('modalDetalle').style.display = 'block';
        document.getElementById('modalTitle').innerText = "Nuevo Detalle";
        document.getElementById('idDetalle').value = ""; // Importante: Limpiar ID para que sea "nuevo"
        document.getElementById('cant').value = "";
        document.getElementById('prec').value = "";
    }

    function editarDetalle(id, idPed, idProd, cant, prec) {
        document.getElementById('modalDetalle').style.display = 'block';
        document.getElementById('modalTitle').innerText = "Editar Detalle";

        // Llenar los campos con la información de la fila
        document.getElementById('idDetalle').value = id;
        document.getElementById('idPed').value = idPed;
        document.getElementById('idProd').value = idProd;
        document.getElementById('cant').value = cant;
        document.getElementById('prec').value = prec;
    }

    function cerrarModal() {
        document.getElementById('modalDetalle').style.display = 'none';
    }
</script>

</body>
</html>
