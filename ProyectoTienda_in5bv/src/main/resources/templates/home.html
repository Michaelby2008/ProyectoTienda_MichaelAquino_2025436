<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ProyectoTienda</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #38bdf8;
            --text-light: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0b0f1a;
            color: var(--text-light);
        }

        /* --- Sidenav Estilizado --- */
        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: var(--secondary);
            overflow-x: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sidenav a {
            padding: 1rem 2rem;
            text-decoration: none;
            font-size: 1rem;
            color: var(--text-dim);
            display: block;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .sidenav a:hover {
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            border-left: 3px solid var(--accent);
        }

        .sidenav .closebtn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            color: var(--text-dim);
        }

        /* --- Sidebar Footer & Logout --- */
        .sidebar-footer {
            margin-top: auto;
            padding: 2rem 1.5rem;
        }

        .logout-link {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .logout-link:hover {
            background: var(--danger);
            color: white;
        }

        /* --- Main Content --- */
        #main {
            transition: margin-left .5s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: var(--secondary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .open-btn {
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-info {
            background: #334155;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .content-area {
            padding: 3rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--secondary);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: var(--accent);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.8rem;
            color: var(--text-light);
        }

        .card p {
            color: var(--text-dim);
            line-height: 1.6;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div class="sidebar-header">
        <h3>Admin Panel</h3>
    </div>
    <a th:href="@{/usuarios}"><i class="icon"></i> Usuarios</a>
    <a href="#"><i class="icon"></i> Proximamente mas entidades</a>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-link">Cerrar Sesión</button>
        </form>
    </div>
</div>

<div id="main">
    <header class="top-bar">
        <span class="open-btn" onclick="openNav()">&#9776; Menú</span>
        <div class="user-info">
            <span>Bienvenido, <strong>Usuario</strong></span>
        </div>
    </header>

    <main class="content-area">
        <div class="card">
            <h2>Gestión de Usuarios</h2>
            <p>Usa el menú lateral para navegar entre las distintas secciones de la tienda. Desde aquí podrás administrar roles, permisos y datos generales.</p>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
    function openNav() {
        document.getElementById("mySidenav").style.width = "280px";
    }

    function closeNav() {
        document.getElementById("mySidenav").style.width = "0";
    }
</script>
</body>
</html>
